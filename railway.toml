[build]
dockerfilePath = "api/Dockerfile"
watchPatterns = ["api/**", "shared/**"]

[deploy]
# Startup: api/Dockerfile ENTRYPOINT (docker-entrypoint.sh runs migrate + node). Do not override here.
# Root path — registered before global /api prefix (see main.ts)
healthcheckPath = "/health"
# First deploy: prisma migrate can be slow
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
